apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: ollama-hostpath-exception
  namespace: kyverno
spec:
  exceptions:
    - policyName: "disallow-host-path"
      ruleNames:
        - "host-path"
        - "autogen-host-path"
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - "ollama"
